name: Build Marp Slides

on:
  push:
    branches: [main]
    paths:
      - 'slides/**/*.md'
      - '.github/workflows/marp-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install marp-cli
        run: npm install -g @marp-team/marp-cli@latest

      - name: Build all Marp slides → docs/slides/
        run: |
          mkdir -p docs/slides
          # Mirror slides/ dir tree under docs/slides/, .md → .html
          while IFS= read -r f; do
            rel="${f#slides/}"
            out="docs/slides/${rel%.md}.html"
            mkdir -p "$(dirname "$out")"
            echo "Building $f → $out"
            marp "$f" -o "$out" --html
          done < <(find slides -type f -name "*.md")

      - name: Regenerate docs/index.html (landing page)
        run: |
          cat > docs/index.html << 'HEADER'
          <!doctype html>
          <html lang="zh-TW">
          <head>
            <meta charset="utf-8">
            <title>Nephrology CME — 投影片首頁</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif; max-width: 900px; margin: 2em auto; padding: 1em; color: #1a2530; line-height: 1.6; }
              h1 { color: #1a5276; border-bottom: 2px solid #1a5276; padding-bottom: 0.3em; }
              h2 { color: #2c3e50; margin-top: 1.8em; border-bottom: 1px solid #d0d8de; padding-bottom: 0.2em; }
              h3 { color: #34495e; margin-top: 1.2em; }
              a { color: #1a5276; text-decoration: none; }
              a:hover { text-decoration: underline; }
              ul { padding-left: 1.5em; }
              li { line-height: 1.9; }
              .meta { color: #777; font-size: 0.85em; margin-bottom: 2em; }
              .repo { background: #f4f6f8; padding: 0.5em 1em; border-left: 3px solid #1a5276; margin: 1em 0; font-size: 0.9em; }
            </style>
          </head>
          <body>
            <h1>Nephrology CME 投影片</h1>
            <p class="meta">Auto-built by GitHub Actions · Marp HTML</p>
            <div class="repo">
              Source repo: <a href="https://github.com/copper0722/nephro-cme">copper0722/nephro-cme</a><br>
              Markdown source: <code>slides/{Book}/Ch{N}_*.md</code> · 自動 build 到 <code>docs/slides/</code>
            </div>
          HEADER

          # List slides grouped by book folder
          last_book=""
          while IFS= read -r f; do
            rel="${f#docs/slides/}"
            book="$(dirname "$rel")"
            chapter="$(basename "$f" .html)"
            if [ "$book" != "$last_book" ]; then
              if [ -n "$last_book" ]; then echo "  </ul>" >> docs/index.html; fi
              echo "  <h2>$book</h2>" >> docs/index.html
              echo "  <ul>" >> docs/index.html
              last_book="$book"
            fi
            # URL-encode the path for href (basic: keep as-is, browsers handle CJK)
            echo "    <li><a href=\"slides/$rel\">$chapter</a></li>" >> docs/index.html
          done < <(find docs/slides -type f -name "*.html" | sort)

          [ -n "$last_book" ] && echo "  </ul>" >> docs/index.html

          cat >> docs/index.html << 'FOOTER'
            <h2>Notes (full markdown)</h2>
            <p>17 chapters Ch01-17 in <a href="https://github.com/copper0722/nephro-cme/tree/main/note">note/ folder on GitHub</a></p>
            <h2>Operation</h2>
            <ul>
              <li>方向鍵 ←/→ 翻頁</li>
              <li><kbd>F</kbd> 全螢幕</li>
              <li><kbd>P</kbd> presenter mode (講者畫面 + 計時)</li>
              <li><kbd>Esc</kbd> 退出全螢幕</li>
            </ul>
          </body>
          </html>
          FOOTER

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: marp build [skip ci]"
            git push
          fi
